service: cloakery

provider:
  name: aws
  runtime: nodejs24.x
  region: us-west-1
  domain:
    name: ${param:domain}
    certificateArn: ${param:domain_certificate_arn}
    createRoute53Record: false
  stage: ${opt:stage, 'dev'}
  architecture: arm64 # Faster and cheaper than x86_64
  memorySize: 1024
  timeout: 30
  logRetentionInDays: 7
  httpApi:
    cors: true
  environment:
    TABLE_NAME: !Ref CloakeryKV
    DATABASE_URL: 
      Fn::Join:
        - ""
        - - "postgres://cloakery_admin:"
          - ${param:db_password}
          - "@"
          - !GetAtt CloakeryDB.Endpoint.Address
          - ":5432/cloakery"
    JWT_SECRET: ${param:jwt_secret}
    RP_ID: ${param:domain}
    RP_NAME: "Cloakery"
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
            - dynamodb:Query
          Resource: !GetAtt CloakeryKV.Arn
  vpc:
    securityGroupIds:
      - !Ref LambdaSecurityGroup
    subnetIds:
      - !Ref PrivateSubnetA
      - !Ref PrivateSubnetB

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: true
    exclude: ['@aws-sdk/*'] # AWS SDK is pre-installed in the Lambda runtime
    target: node24
    platform: node

functions:
  # Proof of Life
  test:
    handler: src/test/index.handler
    environment:
      STAGE: ${opt:stage, 'dev'}
    events:
      - httpApi:
          path: /test
          method: get

  # Passkey Authentication - Registration
  registerOptions:
    handler: src/auth/register.options
    events:
      - httpApi:
          path: /auth/register/options
          method: post
  registerVerify:
    handler: src/auth/register.verify
    events:
      - httpApi:
          path: /auth/register/verify
          method: post

  # Passkey Authentication - Login
  loginOptions:
    handler: src/auth/login.options
    events:
      - httpApi:
          path: /auth/login/options
          method: post
  loginVerify:
    handler: src/auth/login.verify
    events:
      - httpApi:
          path: /auth/login/verify
          method: post

  # Inbound Email Pipeline
  inboundProcessor:
    handler: src/email/inbound.handler
    # SES triggers will be added here

  # Outbound Email Pipeline
  outboundProcessor:
    handler: src/email/outbound.handler
    # SES triggers will be added here

resources:
  Resources:
    # --- Networking (VPC) ---
    VPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsSupport: true
        EnableDnsHostnames: true
        Tags:
          - Key: Name
            Value: ${self:service}-${self:provider:stage}-vpc

    InternetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value: ${self:service}-${self:provider:stage}-igw

    VPCGatewayAttachment:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref VPC
        InternetGatewayId: !Ref InternetGateway

    # Public Subnets (for NAT Gateway)
    PublicSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        CidrBlock: 10.0.1.0/24
        AvailabilityZone: ${self:provider:region}a
        MapPublicIpOnLaunch: true

    PublicSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        CidrBlock: 10.0.2.0/24
        AvailabilityZone: ${self:provider:region}b
        MapPublicIpOnLaunch: true

    # Private Subnets (for RDS and Lambda)
    PrivateSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        CidrBlock: 10.0.3.0/24
        AvailabilityZone: ${self:provider:region}a

    PrivateSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        CidrBlock: 10.0.4.0/24
        AvailabilityZone: ${self:provider:region}b

    # NAT Gateway
    NatEip:
      Type: AWS::EC2::EIP
      DependsOn: VPCGatewayAttachment
      Properties:
        Domain: vpc

    NatGateway:
      Type: AWS::EC2::NatGateway
      Properties:
        AllocationId: !GetAtt NatEip.AllocationId
        SubnetId: !Ref PublicSubnetA

    # Route Tables
    PublicRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref VPC

    PublicRoute:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PublicRouteTable
        DestinationCidrBlock: 0.0.0.0/0
        GatewayId: !Ref InternetGateway

    PublicSubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetA
        RouteTableId: !Ref PublicRouteTable

    PublicSubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetB
        RouteTableId: !Ref PublicRouteTable

    PrivateRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref VPC

    PrivateRoute:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PrivateRouteTable
        DestinationCidrBlock: 0.0.0.0/0
        NatGatewayId: !Ref NatGateway

    PrivateSubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetA
        RouteTableId: !Ref PrivateRouteTable

    PrivateSubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetB
        RouteTableId: !Ref PrivateRouteTable

    # --- Security Groups ---
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Cloakery Lambda functions
        VpcId: !Ref VPC
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0

    DBSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Cloakery RDS instance
        VpcId: !Ref VPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            SourceSecurityGroupId: !Ref LambdaSecurityGroup

    # --- RDS Resources ---
    DBSubnetGroup:
      Type: AWS::RDS::DBSubnetGroup
      Properties:
        DBSubnetGroupDescription: Subnets for Cloakery RDS
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB

    CloakeryDB:
      Type: AWS::RDS::DBInstance
      Properties:
        DBInstanceIdentifier: ${self:service}-${self:provider:stage}-db
        DBName: cloakery
        Engine: postgres
        EngineVersion: "16"
        DBInstanceClass: db.t4g.micro
        AllocatedStorage: "20"
        MasterUsername: cloakery_admin
        MasterUserPassword: ${param:db_password}
        DBSubnetGroupName: !Ref DBSubnetGroup
        VPCSecurityGroups:
          - !Ref DBSecurityGroup
        PubliclyAccessible: false
        StorageType: gp3
        BackupRetentionPeriod: 7
        DeletionProtection: false # Set to true for production

    # --- Other Resources ---
    CloakeryKV:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider:stage}-kv
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TimeToLiveSpecification:
          AttributeName: expires_at
          Enabled: true

    StaticSiteBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${opt:stage, 'dev'}-static-site
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    StaticSiteDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Origins:
            - Id: S3Origin
              DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
              S3OriginConfig:
                OriginAccessIdentity: ""
              OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
            - Id: ApiOrigin
              DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
          Enabled: true
          DefaultRootObject: index.html
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
          CacheBehaviors:
            # Route /test to API Gateway
            - PathPattern: /test
              TargetOriginId: ApiOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
              # Use Managed Policies
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
              OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3 # AllViewer
            # Route /auth/* to API Gateway
            - PathPattern: /auth/*
              TargetOriginId: ApiOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
              # Use Managed Policies
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
              OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3 # AllViewer
          CustomErrorResponses:
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
          Aliases:
            - ${param:domain}
          ViewerCertificate:
            AcmCertificateArn: ${param:domain_certificate_arn}
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021

    CloudFrontOriginAccessControl:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:service}-${opt:stage, 'dev'}-oac
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    StaticSiteBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref StaticSiteBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Action: s3:GetObject
              Effect: Allow
              Resource: !Sub ${StaticSiteBucket.Arn}/*
              Principal:
                Service: cloudfront.amazonaws.com
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${StaticSiteDistribution}

  Outputs:
    StaticSiteBucketName:
      Value: !Ref StaticSiteBucket
    CloudFrontDistributionId:
      Value: !Ref StaticSiteDistribution


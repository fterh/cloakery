name: Reusable Deploy

on:
  workflow_call:
    inputs:
      stage:
        required: true
        type: string
      domain:
        required: true
        type: string
      domain_certificate_arn:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      SERVERLESS_ACCESS_KEY:
        required: true

jobs:
  deploy:
    name: Deploy (${{ inputs.stage }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Serverless Deploy
        run: npx serverless deploy --stage ${{ inputs.stage }} --param="domain=${{ inputs.domain }}" --param="domain_certificate_arn=${{ inputs.domain_certificate_arn }}"
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
